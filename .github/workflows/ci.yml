name: CI

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
      - run: npm run build
      - name: atlas check (example architecture)
        run: |
          mkdir -p /tmp/atlascheck
          cp atlas.example.yaml /tmp/atlascheck/atlas.yaml
          node dist/atlas-check.mjs /tmp/atlascheck
