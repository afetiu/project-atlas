name: CI

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
      - run: npm run build
      - name: atlas check (example architecture, health-gated)
        run: |
          mkdir -p /tmp/atlascheck
          cp atlas.example.yaml /tmp/atlascheck/atlas.yaml
          node dist/atlas-check.mjs /tmp/atlascheck --min-score=70
      - name: Cache Chromium
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: chromium-${{ runner.os }}-1.61.1
      - name: Install Chromium
        run: npx --yes playwright@1.61.1 install --with-deps chromium
      - name: UI interaction suite
        run: npm run test:ui
