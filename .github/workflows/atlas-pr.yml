# Atlas — architecture review on pull requests.
#
# Posts (and keeps updated) a single sticky comment summarizing how the
# architecture changed in a PR, and fails the job if the architecture health
# score drops below the threshold. This file dogfoods Atlas on its own
# `atlas.example.yaml`; copy it into your repo and point ATLAS_FILE at your
# `atlas.yaml` to get the same review on your architecture.
name: Atlas Architecture

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write

env:
  ATLAS_FILE: atlas.example.yaml
  MIN_SCORE: '70'

jobs:
  architecture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # need the base ref to diff against

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Health gate
        run: node dist/atlas-check.mjs "$(dirname "$ATLAS_FILE")" --min-score="$MIN_SCORE"
        # Note: atlas-check reads <dir>/atlas.yaml; for a repo whose model is at
        # the root this is just `node dist/atlas-check.mjs . --min-score=70`.
        continue-on-error: true

      - name: Architecture diff
        id: diff
        run: |
          base=$(mktemp)
          if ! git show "origin/${{ github.base_ref }}:$ATLAS_FILE" > "$base" 2>/dev/null; then
            printf 'version: 1\nnodes: []\nedges: []\ngroups: []\n' > "$base"
          fi
          body=$(node dist/atlas-diff.mjs "$base" "$ATLAS_FILE")
          {
            echo 'body<<ATLAS_EOF'
            echo "$body"
            echo 'ATLAS_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Post sticky comment
        uses: actions/github-script@v7
        with:
          script: |
            const body = process.env.BODY;
            const marker = '<!-- atlas-pr-comment -->';
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find((c) => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
        env:
          BODY: ${{ steps.diff.outputs.body }}
